<div class="list-wrapper">
  <mat-card class="list-card">
    <mat-card-header>
      <div class="header-content">
        <div>
          <mat-card-title>Empresas</mat-card-title>
          <mat-card-subtitle>Gestiona las empresas registradas en la plataforma</mat-card-subtitle>
        </div>
        <button mat-raised-button color="primary" class="create-btn" (click)="createBusiness()">
          <mat-icon>add</mat-icon>
          Nueva Empresa
        </button>
      </div>
    </mat-card-header>

    <mat-card-content>
      <div class="table-container mat-elevation-z2">
        <table mat-table [dataSource]="businesses" class="full-width-table">
          
          <!-- Name Column -->
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Empresa </th>
            <td mat-cell *matCellDef="let element">
              <div class="primary-text">{{element.name}}</div>
              <div class="secondary-text">NIT: {{element.nit}}</div>
            </td>
          </ng-container>

          <!-- Address Column -->
          <ng-container matColumnDef="address">
            <th mat-header-cell *matHeaderCellDef> Dirección </th>
            <td mat-cell *matCellDef="let element"> {{element.address}} </td>
          </ng-container>

          <!-- User ID Column -->
          <ng-container matColumnDef="userId">
            <th mat-header-cell *matHeaderCellDef> Agente (User ID) </th>
            <td mat-cell *matCellDef="let element"> {{element.userId}} </td>
          </ng-container>

          <!-- Actions Column -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="actions-header"> Acciones </th>
            <td mat-cell *matCellDef="let element" class="actions-cell">
              <button mat-icon-button color="primary" (click)="editBusiness(element.id)" aria-label="Editar empresa">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="deleteBusiness(element.id)" aria-label="Eliminar empresa">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          
          <!-- Row shown when data is loading -->
          <tr class="mat-row" *ngIf="isLoading">
            <td class="mat-cell empty-cell" colspan="4">Cargando empresas...</td>
          </tr>

          <!-- Row shown when there is no matching data and not loading. -->
          <tr class="mat-row" *ngIf="!isLoading && businesses.length === 0">
            <td class="mat-cell empty-cell" colspan="4">No hay empresas registradas.</td>
          </tr>
        </table>
      </div>
    </mat-card-content>
  </mat-card>
</div>
