<div class="list-users-wrapper">
  <mat-card class="list-users-card">
    <mat-card-header>
      <div class="header-content">
        <div>
          <mat-card-title>Usuarios</mat-card-title>
          <mat-card-subtitle>Gestiona los usuarios registrados</mat-card-subtitle>
        </div>
        <button mat-raised-button color="primary" class="create-btn" (click)="createUser()">
          <mat-icon>add</mat-icon>
          Nuevo Usuario
        </button>
      </div>
    </mat-card-header>

    <mat-card-content>
      <div class="table-container mat-elevation-z2">
        <table mat-table [dataSource]="users" class="full-width-table">
          
          <!-- Name Column -->
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Nombre </th>
            <td mat-cell *matCellDef="let element">
              <div class="user-name">{{element.name}} {{element.lastName}}</div>
              <div class="user-id">ID: {{element.identification}}</div>
            </td>
          </ng-container>

          <!-- Email Column -->
          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef> Correo Electrónico </th>
            <td mat-cell *matCellDef="let element"> {{element.email}} </td>
          </ng-container>

          <!-- City Column -->
          <ng-container matColumnDef="city">
            <th mat-header-cell *matHeaderCellDef> Ciudad </th>
            <td mat-cell *matCellDef="let element"> {{element.city}} </td>
          </ng-container>

          <!-- Actions Column -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="actions-header"> Acciones </th>
            <td mat-cell *matCellDef="let element" class="actions-cell">
              <button mat-icon-button color="primary" (click)="editUser(element.id)" aria-label="Editar usuario">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="deleteUser(element.id)" aria-label="Eliminar usuario">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          
          <!-- Row shown when data is loading -->
          <tr class="mat-row" *ngIf="isLoading">
            <td class="mat-cell empty-cell" colspan="4">Cargando usuarios...</td>
          </tr>

          <!-- Row shown when there is no matching data and not loading. -->
          <tr class="mat-row" *ngIf="!isLoading && users.length === 0">
            <td class="mat-cell empty-cell" colspan="4">No hay usuarios registrados.</td>
          </tr>
        </table>
      </div>
    </mat-card-content>
  </mat-card>
</div>
