<div class="list-products-wrapper">
  <mat-card class="list-products-card">
    <mat-card-header>
      <div class="header-content">
        <div>
          <mat-card-title>Productos</mat-card-title>
          <mat-card-subtitle>Gestiona el inventario de productos</mat-card-subtitle>
        </div>
        <button mat-raised-button color="primary" class="create-btn" (click)="createProduct()">
          <mat-icon>add</mat-icon>
          Nuevo Producto
        </button>
      </div>
    </mat-card-header>

    <mat-card-content>
      <div class="table-container mat-elevation-z2">
        <table mat-table [dataSource]="products" class="full-width-table">
          
          <!-- Name Column -->
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Producto </th>
            <td mat-cell *matCellDef="let element">
              <div class="product-name">{{element.name}}</div>
              <div class="product-desc">{{element.description}}</div>
            </td>
          </ng-container>

          <!-- Price Column -->
          <ng-container matColumnDef="measure_unit">
            <th mat-header-cell *matHeaderCellDef> Unidad de medida </th>
            <td mat-cell *matCellDef="let element"> {{element.measure_unit}} </td>
          </ng-container>

          <!-- Stock Column -->
          <ng-container matColumnDef="stock">
            <th mat-header-cell *matHeaderCellDef> Stock </th>
            <td mat-cell *matCellDef="let element"> {{element.stock}} </td>
          </ng-container>

          <!-- Actions Column -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="actions-header"> Acciones </th>
            <td mat-cell *matCellDef="let element" class="actions-cell">
              <button mat-icon-button color="primary" (click)="editProduct(element.id)" aria-label="Editar producto">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="deleteProduct(element.id)" aria-label="Eliminar producto">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          
          <!-- Row shown when data is loading -->
          <tr class="mat-row" *ngIf="isLoading">
            <td class="mat-cell empty-cell" colspan="4">Cargando productos...</td>
          </tr>

          <!-- Row shown when there is no matching data and not loading. -->
          <tr class="mat-row" *ngIf="!isLoading && products.length === 0">
            <td class="mat-cell empty-cell" colspan="4">No hay productos registrados.</td>
          </tr>
        </table>
      </div>
    </mat-card-content>
  </mat-card>
</div>
