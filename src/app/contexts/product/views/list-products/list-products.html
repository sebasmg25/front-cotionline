<div class="list-products-wrapper">
  <mat-card class="list-products-card">
    <mat-card-header>
      <div class="header-content">
        <div>
          <mat-card-title>Productos de la Solicitud</mat-card-title>
          <mat-card-subtitle>Listado de artículos requeridos para cotizar</mat-card-subtitle>
        </div>
        <button
          mat-raised-button
          color="primary"
          class="create-btn"
          (click)="createProduct()"
          [disabled]="!quotationRequestId"
        >
          <mat-icon>add</mat-icon>
          Nuevo Producto
        </button>
      </div>
    </mat-card-header>

    <mat-card-content>
      <div class="table-container mat-elevation-z2">
        <div class="responsive-table-container">
          <table mat-table [dataSource]="products" class="full-width-table">
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef>Producto</th>
              <td mat-cell *matCellDef="let element">
                <div class="product-name">{{ element.name }}</div>
                <div class="product-desc">{{ element.description }}</div>
              </td>
            </ng-container>

            <ng-container matColumnDef="unitOfMeasurement">
              <th mat-header-cell *matHeaderCellDef>U. Medida</th>
              <td mat-cell *matCellDef="let element">{{ element.unitOfMeasurement }}</td>
            </ng-container>

            <ng-container matColumnDef="amount">
              <th mat-header-cell *matHeaderCellDef>Cantidad</th>
              <td mat-cell *matCellDef="let element">{{ element.amount }}</td>
            </ng-container>

            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef class="actions-header">Acciones</th>
              <td mat-cell *matCellDef="let element" class="actions-cell">
                <button
                  mat-icon-button
                  color="primary"
                  (click)="editProduct(element.id)"
                  aria-label="Editar"
                >
                  <mat-icon>edit</mat-icon>
                </button>
                <button
                  mat-icon-button
                  color="warn"
                  (click)="deleteProduct(element.id)"
                  aria-label="Eliminar"
                >
                  <mat-icon>delete</mat-icon>
                </button>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

            <tr class="mat-row" *ngIf="isLoading">
              <td class="mat-cell empty-cell" colspan="4">Buscando productos...</td>
            </tr>

            <tr class="mat-row" *ngIf="!isLoading && products.length === 0">
              <td class="mat-cell empty-cell" colspan="4">No hay productos en esta solicitud.</td>
            </tr>
          </table>
        </div>
      </div>
    </mat-card-content>
  </mat-card>
</div>
