<div class="list-wrapper">
  <mat-card class="list-card">
    <mat-card-header>
      <div class="header-content">
        <div>
          <mat-card-title>Sedes de {{ businessName || 'tu Negocio' }}</mat-card-title>
          <mat-card-subtitle>Gestiona los puntos de atención y sucursales</mat-card-subtitle>
        </div>
        <button
          mat-raised-button
          color="primary"
          class="create-btn"
          (click)="createBranch()"
          id="guide-new-branch"
        >
          <mat-icon>add</mat-icon>
          NUEVA SEDE
        </button>
      </div>
    </mat-card-header>

    <mat-card-content>
      <div *ngIf="isLoading" class="loading-shade">
        <mat-spinner diameter="40"></mat-spinner>
        <span style="margin-top: 10px">Cargando sedes...</span>
      </div>

      <div class="table-container mat-elevation-z2" id="guide-branches-table">
        <div class="responsive-table-container">
          <table mat-table [dataSource]="branches" class="full-width-table">
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef>Sede</th>
              <td mat-cell *matCellDef="let element">
                <div class="branch-name">{{ element.name }}</div>
              </td>
            </ng-container>

            <ng-container matColumnDef="address">
              <th mat-header-cell *matHeaderCellDef>Dirección</th>
              <td mat-cell *matCellDef="let element">{{ element.address }}</td>
            </ng-container>

            <ng-container matColumnDef="location">
              <th mat-header-cell *matHeaderCellDef>Ciudad</th>
              <td mat-cell *matCellDef="let element">
                <div class="location-badge" style="display: flex; align-items: center; gap: 5px">
                  <mat-icon style="font-size: 18px; width: 18px; height: 18px">location_on</mat-icon>
                  {{ element.city }}
                </div>
              </td>
            </ng-container>

            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef class="actions-header">Acciones</th>
              <td mat-cell *matCellDef="let element" class="actions-cell">
                <button
                  mat-icon-button
                  color="primary"
                  (click)="editBranch(element.id)"
                  matTooltip="Editar"
                >
                  <mat-icon>edit</mat-icon>
                </button>
                <button
                  mat-icon-button
                  color="warn"
                  (click)="deleteBranch(element.id)"
                  matTooltip="Eliminar"
                >
                  <mat-icon>delete</mat-icon>
                </button>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

            <tr class="mat-row" *ngIf="!isLoading && branches.length === 0">
              <td
                class="mat-cell empty-results"
                colspan="4"
                style="text-align: center; padding: 40px"
              >
                <mat-icon style="font-size: 48px; width: 48px; height: 48px; color: #ccc"
                  >storefront</mat-icon
                >
                <p>No hay sedes registradas para este negocio.</p>
              </td>
            </tr>
          </table>
        </div>
      </div>
    </mat-card-content>
  </mat-card>
</div>
