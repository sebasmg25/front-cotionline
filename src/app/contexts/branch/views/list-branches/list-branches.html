<div class="list-wrapper">
  <mat-card class="list-card">
    <mat-card-header>
      <div class="header-content">
        <div>
          <mat-card-title>Sedes</mat-card-title>
          <mat-card-subtitle>Gestiona los puntos de atención o sedes de las empresas</mat-card-subtitle>
        </div>
        <button mat-raised-button color="primary" class="create-btn" (click)="createBranch()" id="guide-new-branch">
          <mat-icon>add</mat-icon>
          Nueva Sede
        </button>
      </div>
    </mat-card-header>

    <mat-card-content>
      <div class="table-container mat-elevation-z2" id="guide-branches-table">
        <table mat-table [dataSource]="branches" class="full-width-table">
          
          <!-- Name Column -->
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Sede </th>
            <td mat-cell *matCellDef="let element">
              <div class="primary-text">{{element.name}}</div>
              <div class="secondary-text">{{element.city}}</div>
            </td>
          </ng-container>

          <!-- Address Column -->
          <ng-container matColumnDef="address">
            <th mat-header-cell *matHeaderCellDef> Dirección </th>
            <td mat-cell *matCellDef="let element"> {{element.address}} </td>
          </ng-container>

          <!-- Business ID Column -->
          <ng-container matColumnDef="businessId">
            <th mat-header-cell *matHeaderCellDef> Empresa (Business ID) </th>
            <td mat-cell *matCellDef="let element"> {{element.businessId}} </td>
          </ng-container>

          <!-- Actions Column -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="actions-header"> Acciones </th>
            <td mat-cell *matCellDef="let element" class="actions-cell">
              <button mat-icon-button color="primary" (click)="editBranch(element.id)" aria-label="Editar sede">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="deleteBranch(element.id)" aria-label="Eliminar sede">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          
          <!-- Row shown when data is loading -->
          <tr class="mat-row" *ngIf="isLoading">
            <td class="mat-cell empty-cell" colspan="4">Cargando sedes...</td>
          </tr>

          <!-- Row shown when there is no matching data and not loading. -->
          <tr class="mat-row" *ngIf="!isLoading && branches.length === 0">
            <td class="mat-cell empty-cell" colspan="4">No hay sedes registradas.</td>
          </tr>
        </table>
      </div>
    </mat-card-content>
  </mat-card>
</div>
