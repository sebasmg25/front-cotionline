<div class="edit-wrapper">
  <mat-card class="edit-form-card">
    <mat-card-header>
      <button mat-icon-button (click)="goBack()" class="back-button" aria-label="Volver atrás">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <mat-card-title>Editar Sede</mat-card-title>
      <mat-card-subtitle>Actualiza los detalles de ubicación de la sede</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content *ngIf="!branchNotFound; else notFoundTemplate">
      <form [formGroup]="branchForm" (ngSubmit)="onSubmit()" class="branch-form">
        
        <mat-form-field appearance="outline" class="full-width-input">
          <mat-label>Nombre de la Sede</mat-label>
          <input matInput formControlName="name" placeholder="Ej: Sede Principal">
          <mat-error *ngIf="branchForm.get('name')?.hasError('required')">El nombre es requerido</mat-error>
        </mat-form-field>

        <div class="form-row">
          <mat-form-field appearance="outline" class="half-width-input">
            <mat-label>Ciudad</mat-label>
            <input matInput formControlName="city" placeholder="Ej: Bogotá">
            <mat-error *ngIf="branchForm.get('city')?.hasError('required')">La ciudad es requerida</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="half-width-input">
            <mat-label>Dirección</mat-label>
            <input matInput formControlName="address" placeholder="Ej: Calle 123 #45-67">
            <mat-error *ngIf="branchForm.get('address')?.hasError('required')">La dirección es requerida</mat-error>
          </mat-form-field>
        </div>

      </form>
    </mat-card-content>

    <ng-template #notFoundTemplate>
      <div class="not-found-message">
        <mat-icon color="warn">location_off</mat-icon>
        <p>La sucursal solicitada no fue encontrada.</p>
      </div>
    </ng-template>

    <mat-card-actions class="card-actions-center" *ngIf="!branchNotFound">
      <button mat-raised-button color="primary" class="submit-button" [disabled]="branchForm.invalid || isSaving || isLoading" (click)="onSubmit()">
        {{ isSaving ? 'Actualizando...' : 'Actualizar Sucursal' }}
      </button>
    </mat-card-actions>
  </mat-card>
</div>
