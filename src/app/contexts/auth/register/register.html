<div class="register-wrapper">
  <mat-card class="register-form-card">
    <mat-card-header>
      <mat-card-title>¡Comienza hoy tu prueba gratuita!</mat-card-title>
    </mat-card-header>

    <!-- Se agrega la etiqueta <form> para cumplir con las mejores prácticas de Angular y evitar el error NG01352 -->
    <form>
      <mat-card-content>
        <!-- 1. Campo de Identificación -->
        <mat-form-field appearance="outline" class="full-width-input">
          <mat-label>Identificación</mat-label>
          <input
            [(ngModel)]="identification"
            matInput
            placeholder="El valor debe ser un número"
            type="number"
            name="identification"
          />
          <mat-icon matPrefix>person</mat-icon>
          <mat-hint>Introduce tu número de identificación.</mat-hint>
        </mat-form-field>

        <!-- 2. Campo de Nombre -->
        <mat-form-field appearance="outline" class="full-width-input">
          <mat-label>Nombre</mat-label>
          <input [(ngModel)]="name" matInput placeholder="Juan" name="firstName" />
          <mat-icon matPrefix>person</mat-icon>
          <mat-hint>Introduce tu nombre.</mat-hint>
        </mat-form-field>

        <!-- 3. Campo de Apellido -->
        <mat-form-field appearance="outline" class="full-width-input">
          <mat-label>Apellido</mat-label>
          <input [(ngModel)]="lastName" matInput placeholder="Pérez" name="lastName" />
          <mat-icon matPrefix>person</mat-icon>
          <mat-hint>Introduce tu apellido.</mat-hint>
        </mat-form-field>

        <!-- 4. Campo de Correo Electrónico (Email) -->
        <mat-form-field appearance="outline" class="full-width-input">
          <mat-label>Correo Electrónico</mat-label>
          <input
            [(ngModel)]="email"
            matInput
            placeholder="ejemplo@dominio.com"
            type="email"
            name="email"
          />
          <mat-icon matPrefix>email</mat-icon>
        </mat-form-field>

        <!-- 5. Campo de Ciudad -->
        <mat-form-field appearance="outline" class="full-width-input">
          <mat-label>Ciudad</mat-label>
          <input [(ngModel)]="city" matInput placeholder="Rionegro" name="city" />
          <mat-icon matPrefix>location_on</mat-icon>
        </mat-form-field>

        <!-- 6. Campo de Contraseña -->
        <mat-form-field appearance="outline" class="full-width-input">
          <mat-label>Contraseña</mat-label>
          <input
            [(ngModel)]="password"
            matInput
            type="password"
            placeholder="Mínimo 8 caracteres"
            name="password"
          />
          <mat-icon matPrefix>lock</mat-icon>
        </mat-form-field>

        <!-- 7. Campo de Confirmación de Contraseña -->
        <mat-form-field appearance="outline" class="full-width-input">
          <mat-label>Confirmar Contraseña</mat-label>
          <input
            [(ngModel)]="confirmPassword"
            matInput
            type="password"
            placeholder="Repite tu contraseña"
            name="confirmPassword"
          />
          <mat-icon matPrefix>lock_reset</mat-icon>
        </mat-form-field>
      </mat-card-content>

      <mat-card-actions class="card-actions-center">
        <!-- El botón de registro debe tener una etiqueta clara -->
        <button (click)="registerUser()" mat-raised-button color="primary" class="register-button">
          CREAR CUENTA
        </button>
      </mat-card-actions>
    </form>
  </mat-card>
</div>
